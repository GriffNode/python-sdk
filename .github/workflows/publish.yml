name: publish
on:
  release:
    types: [published]
permissions:
  id-token: write          # PyPI Trusted Publishing (OIDC) — no long-lived token
  contents: read
jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pipx run build
      - uses: pypa/gh-action-pypi-publish@release/v1
